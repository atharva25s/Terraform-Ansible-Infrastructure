- name: "2.1 | Create working directory {{ workdir }}"
  file:
    path: "{{ workdir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: "2.2 | Install git"
  apt:
    name: git
    state: present

- name: "2.3 | Clone the application repo"
  become_user: ubuntu
  git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_dir }}"
    version: main
    force: true
